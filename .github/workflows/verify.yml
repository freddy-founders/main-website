name: trunk

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: trunk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI / EaC gates
    runs-on: ubuntu-latest
    env:
      VITE_DATA_SOURCE: ${{ vars.VITE_DATA_SOURCE }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm fmt:check

      - name: Build design tokens
        run: pnpm tokens:build

      - name: Check environment contract
        run: pnpm env:check

      - name: Check design contract
        run: pnpm design:check

      - name: Typecheck
        run: pnpm check:types

      - name: Run TDD unit tests
        run: pnpm test:unit

      - name: Run BDD requirements
        run: pnpm bdd

      - name: Build app
        run: pnpm build

      - name: Smoke production routes
        run: pnpm smoke:routes

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error

  terraform:
    name: CI / Terraform validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=infra/terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate

  terraform-apply:
    name: CD / Terraform apply
    runs-on: ubuntu-latest
    needs:
      - ci
      - terraform
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.TERRAFORM_AUTO_APPLY == 'true'
    environment:
      name: production
    concurrency:
      group: production-terraform
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_TERRAFORM_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      TF_VAR_create_supabase_project: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Terraform auto-apply
        run: pnpm tf:apply
  deploy:
    name: CD / Cloudflare deploy
    runs-on: ubuntu-latest
    needs:
      - ci
      - terraform
      - terraform-apply
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci.result == 'success' && needs.terraform.result == 'success' && (needs.terraform-apply.result == 'success' || needs.terraform-apply.result == 'skipped')
    environment:
      name: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Verify deployment credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing GitHub secret CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing GitHub variable CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Deploy to Cloudflare
        id: deploy
        run: pnpm exec wrangler deploy
