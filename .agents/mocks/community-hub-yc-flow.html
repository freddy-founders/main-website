<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freddy Founders Nine-Page Site Mock</title>
    <style>
      :root {
        --paper: #f0eee7;
        --paper-2: #e3dbd2;
        --paper-3: #fffaf1;
        --ink: #050505;
        --muted: #5f5f55;
        --shell: #d8d1c8;
        --accent: #9f2d20;
        --accent-soft: #f0c9bf;
        --ok: #316b3f;
        --warn: #8b5e00;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100%;
      }
      body {
        margin: 0;
        background: var(--shell);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        letter-spacing: -0.01em;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.09;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.09) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 0, 0, 0.07) 1px, transparent 1px);
        background-size: 18px 18px;
        mix-blend-mode: multiply;
        z-index: 50;
      }

      .mono {
        font-family: 'IBM Plex Mono', 'Courier New', monospace;
        letter-spacing: 0.052em;
        text-transform: uppercase;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        width: 230px;
        background: var(--ink);
        color: var(--paper);
        border-right: 3px solid var(--accent);
        overflow-y: auto;
        z-index: 20;
      }
      .sidebar-head {
        padding: 14px 12px;
        border-bottom: 1px solid var(--accent);
      }
      .sidebar-title {
        font-size: 19px;
        line-height: 0.9;
        font-weight: 950;
        text-transform: uppercase;
        letter-spacing: -0.06em;
      }
      .sidebar-subtitle {
        margin-top: 9px;
        color: #c7c7bd;
        font-size: 10px;
        line-height: 1.35;
      }
      .screen-group {
        padding: 10px 0;
      }
      .side-label {
        padding: 8px 12px 5px;
        color: #8f8f84;
        font-size: 9px;
      }
      .screen-link {
        width: 100%;
        display: block;
        border: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.16);
        background: transparent;
        color: var(--paper);
        padding: 10px 12px;
        text-align: left;
        font:
          800 11px/1.12 'IBM Plex Mono',
          'Courier New',
          monospace;
        letter-spacing: 0.052em;
        text-transform: uppercase;
        cursor: pointer;
      }
      .screen-link:hover,
      .screen-link.active {
        background: var(--accent);
        color: #fff;
      }
      .screen-link.sub {
        padding-left: 26px;
        font-weight: 500;
        color: #d5d5cb;
        border-top: 0;
      }
      .screen-link small {
        display: block;
        margin-top: 4px;
        color: rgba(255, 255, 255, 0.58);
        font-size: 9px;
        letter-spacing: 0.025em;
        line-height: 1.25;
      }

      .main {
        min-height: 100vh;
        margin-left: 230px;
        padding: 22px 26px 34px;
      }
      .canvas-toolbar {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 14px;
        align-items: end;
        border: 2px solid var(--ink);
        border-bottom: 0;
        background: var(--paper);
        padding: 12px;
        max-width: 1240px;
        margin: 0 auto;
      }
      .canvas-title {
        font-size: clamp(36px, 5.2vw, 76px);
        line-height: 0.82;
        font-weight: 950;
        letter-spacing: -0.065em;
        text-transform: uppercase;
      }
      .canvas-note {
        margin-top: 8px;
        color: var(--muted);
        font-size: 10px;
      }
      .device-controls {
        display: flex;
        border: 2px solid var(--ink);
        background: var(--ink);
        gap: 1px;
        align-self: stretch;
      }
      .device-btn {
        border: 0;
        background: var(--paper);
        color: var(--ink);
        min-width: 92px;
        padding: 10px 12px;
        font-size: 11px;
        cursor: pointer;
      }
      .device-btn.active {
        background: var(--accent);
        color: #fff;
      }
      .spec-link {
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid var(--ink);
        background: var(--accent);
        color: #fff;
        padding: 10px 12px;
        min-width: 118px;
        text-decoration: none;
        font-size: 11px;
        align-self: stretch;
      }
      .stage {
        max-width: 1240px;
        margin: 0 auto;
        border: 2px solid var(--ink);
        background: var(--paper-2);
        min-height: 780px;
        padding: 18px;
        display: grid;
        place-items: start center;
        overflow-x: auto;
      }
      .desktop-frame,
      .mobile-frame {
        background: var(--ink);
        padding: 3px;
        width: 100%;
      }
      .desktop-frame {
        max-width: 1160px;
        height: 730px;
      }
      .mobile-frame {
        width: 390px;
        height: 844px;
      }
      .desktop-screen,
      .mobile-screen {
        height: 100%;
        width: 100%;
        overflow: auto;
        background: var(--paper);
        color: var(--ink);
      }

      .surface {
        background: var(--paper);
        color: var(--ink);
        min-height: 100%;
      }
      .topbar {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: stretch;
        background: var(--accent);
        color: #fff;
        border-bottom: 3px solid var(--ink);
      }
      .mark {
        display: grid;
        place-items: center;
        width: 44px;
        border-right: 2px solid var(--ink);
        font-weight: 950;
        font-size: 26px;
        line-height: 1;
      }
      .top-main {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 10px;
        min-width: 0;
        overflow: hidden;
      }
      .brand {
        color: #fff;
        font-size: 13px;
        font-weight: 950;
        white-space: nowrap;
      }
      .nav {
        display: flex;
        gap: 8px;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        color: #f8ded8;
        font-size: 10px;
      }
      .nav span::before {
        content: '/';
        margin-right: 8px;
        color: var(--accent-soft);
      }
      .login-link,
      .admin-link {
        background: #fff;
        color: var(--accent);
        border-left: 2px solid var(--ink);
        padding: 10px 14px;
        white-space: nowrap;
        font-size: 10px;
        font-weight: 950;
      }
      .auth-links {
        display: flex;
        align-items: stretch;
        background: #fff;
        border-left: 2px solid var(--ink);
      }
      .auth-links span {
        display: flex;
        align-items: center;
        padding: 10px 12px;
        color: var(--accent);
        border-left: 1px solid var(--ink);
        white-space: nowrap;
        font-size: 10px;
        font-weight: 950;
      }
      .auth-links span:first-child {
        border-left: 0;
      }
      .admin-link {
        background: var(--ink);
        color: #fff;
      }

      .page-head {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        border-bottom: 2px solid var(--ink);
        background: var(--paper);
      }
      .page-title {
        padding: 14px 14px 12px;
      }
      .kicker {
        color: var(--accent);
        font-size: 10px;
      }
      .h1 {
        margin-top: 5px;
        font-size: clamp(44px, 6.8vw, 88px);
        line-height: 0.82;
        letter-spacing: -0.075em;
        font-weight: 950;
        text-transform: uppercase;
      }
      .subcopy {
        max-width: 680px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }
      .head-stats {
        display: grid;
        grid-template-columns: repeat(2, 110px);
        border-left: 2px solid var(--ink);
        background: var(--paper-2);
      }
      .stat {
        padding: 10px;
        border-left: 1px solid var(--ink);
        border-bottom: 1px solid var(--ink);
      }
      .stat:nth-child(odd) {
        border-left: 0;
      }
      .stat-num {
        font-size: 29px;
        line-height: 0.88;
        font-weight: 950;
        letter-spacing: -0.06em;
      }
      .stat-label {
        margin-top: 4px;
        color: var(--muted);
        font-size: 9px;
      }

      .stripe-line {
        height: 8px;
        background: repeating-linear-gradient(90deg, var(--accent) 0 14px, var(--paper) 14px 19px);
        border-top: 2px solid var(--ink);
        border-bottom: 2px solid var(--ink);
      }
      .grid-2 {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 310px;
        min-height: calc(730px - 43px - 132px);
      }
      .grid-public {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 310px;
        min-height: calc(730px - 43px - 12px);
      }
      .detail-single {
        min-height: calc(730px - 43px - 12px);
      }
      .grid-even {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: calc(730px - 43px - 132px);
      }
      .grid-admin {
        display: grid;
        grid-template-columns: 290px minmax(0, 1fr) 310px;
        min-height: calc(730px - 43px - 132px);
      }
      .single {
        min-height: calc(730px - 43px - 132px);
      }
      .panel {
        border-right: 2px solid var(--ink);
        min-width: 0;
      }
      .panel:last-child {
        border-right: 0;
      }
      .panel-stack {
        border-left: 2px solid var(--ink);
      }
      .panel-stack .panel {
        border-right: 0;
        border-bottom: 2px solid var(--ink);
      }
      .panel-stack .panel:last-child {
        border-bottom: 0;
      }
      .panel-head {
        padding: 8px 9px;
        background: var(--ink);
        color: #fff;
        border-bottom: 2px solid var(--ink);
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 10px;
      }
      .panel-head.accent {
        background: var(--accent);
      }
      .panel-body {
        padding: 9px;
      }

      .event-list,
      .person-list,
      .admin-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .event-row {
        display: grid;
        grid-template-columns: 90px minmax(0, 1fr) auto;
        gap: 10px;
        border-bottom: 1px solid var(--ink);
        padding: 10px 0;
      }
      .event-row:first-child {
        padding-top: 0;
      }
      .datebox {
        color: var(--accent);
        font-weight: 950;
        font-size: 11px;
        line-height: 1.12;
      }
      .row-title {
        font-size: 14px;
        line-height: 1.18;
        font-weight: 900;
        letter-spacing: -0.015em;
        text-transform: uppercase;
      }
      .row-meta,
      .tiny,
      .meta {
        color: var(--muted);
        font-size: 9px;
        line-height: 1.35;
      }
      .row-copy {
        margin-top: 4px;
        color: #262622;
        font-size: 11px;
        line-height: 1.35;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        align-content: start;
        justify-content: flex-end;
      }
      .btn {
        display: inline-block;
        border: 1px solid var(--ink);
        background: var(--paper);
        color: var(--ink);
        padding: 6px 7px;
        text-decoration: none;
        font-size: 9px;
        font-weight: 950;
        white-space: nowrap;
      }
      .btn.primary {
        background: var(--accent);
        color: #fff;
      }
      .btn.ok {
        background: var(--ok);
        color: #fff;
      }
      .tag {
        display: inline-block;
        border: 1px solid var(--ink);
        padding: 2px 4px;
        margin: 4px 3px 0 0;
        color: var(--ink);
        background: var(--paper-2);
        font-size: 9px;
      }
      .tag.accent {
        background: var(--accent);
        color: #fff;
      }
      .tag.ok {
        background: #d9ecd8;
        color: var(--ok);
      }
      .tag.warn {
        background: #f3e0ae;
        color: #6b4500;
      }

      .filterbar {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 8px;
        border: 1px solid var(--ink);
        background: var(--paper-2);
        margin-bottom: 9px;
      }
      .search {
        flex: 1 1 220px;
        border: 1px solid var(--ink);
        padding: 8px;
        background: #fffef7;
        color: var(--ink);
        font:
          10px/1.2 'IBM Plex Mono',
          'Courier New',
          monospace;
        text-transform: uppercase;
      }
      .chip {
        border: 1px solid var(--ink);
        background: var(--paper);
        padding: 7px 8px;
        font-size: 9px;
      }
      .chip.active {
        background: var(--accent);
        color: #fff;
      }

      .reddit-card {
        border-bottom: 2px solid var(--ink);
        background: var(--paper);
      }
      .reddit-card:last-child {
        border-bottom: 0;
      }
      .reddit-card .panel-head {
        border-bottom: 1px solid var(--ink);
      }
      .sidebar-copy {
        padding: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }
      .sidebar-row {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        padding: 8px 10px;
        border-top: 1px solid rgba(0, 0, 0, 0.18);
        font-size: 11px;
        line-height: 1.35;
      }
      .sidebar-icon {
        width: 18px;
        color: var(--accent);
        font-weight: 950;
        text-align: center;
        flex: 0 0 18px;
      }
      .sidebar-stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        border-top: 1px solid var(--ink);
        border-bottom: 1px solid var(--ink);
      }
      .sidebar-stat {
        padding: 10px;
        border-right: 1px solid var(--ink);
      }
      .sidebar-stat:last-child {
        border-right: 0;
      }
      .sidebar-stat strong {
        display: block;
        font-size: 18px;
        line-height: 1;
        color: var(--ink);
      }
      .bookmark {
        display: block;
        margin: 8px 10px;
        padding: 9px 10px;
        border: 1px solid var(--ink);
        border-radius: 999px;
        background: #203438;
        color: #fff;
        text-align: center;
        text-decoration: none;
        font-size: 10px;
        font-weight: 950;
      }
      .rule-row {
        display: grid;
        grid-template-columns: 28px 1fr auto;
        gap: 8px;
        align-items: start;
        padding: 9px 10px;
        border-top: 1px solid rgba(0, 0, 0, 0.18);
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }
      .rule-num {
        color: var(--muted);
        text-align: right;
      }
      .chev {
        color: var(--ink);
        font-weight: 950;
      }

      .sidebar-hero {
        padding: 10px;
      }
      .sidebar-kicker {
        color: var(--accent);
        font-size: 10px;
      }
      .sidebar-title-lg {
        margin-top: 4px;
        font-size: 34px;
        line-height: 0.86;
        letter-spacing: -0.06em;
        font-weight: 950;
        text-transform: uppercase;
      }
      .sidebar-subcopy {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.42;
      }

      .person-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        border-bottom: 1px solid var(--ink);
        padding: 10px 0;
      }
      .person-row:first-child {
        padding-top: 0;
      }
      .name {
        font-size: 15px;
        line-height: 1.1;
        font-weight: 950;
        text-transform: uppercase;
        letter-spacing: -0.02em;
      }
      .profile-hero {
        display: grid;
        grid-template-columns: 1fr 290px;
        border-bottom: 2px solid var(--ink);
      }
      .profile-main {
        padding: 16px;
      }
      .profile-name {
        font-size: clamp(48px, 8vw, 96px);
        line-height: 0.78;
        letter-spacing: -0.075em;
        font-weight: 950;
        text-transform: uppercase;
      }
      .facts {
        border-left: 2px solid var(--ink);
        background: var(--paper-2);
      }
      .fact {
        padding: 10px;
        border-bottom: 1px solid var(--ink);
      }
      .fact-label {
        color: var(--muted);
        font-size: 9px;
      }
      .fact-value {
        margin-top: 4px;
        font-size: 12px;
        font-weight: 800;
      }

      .form-grid {
        display: grid;
        gap: 7px;
      }
      .field {
        width: 100%;
        border: 1px solid var(--ink);
        background: #fffef7;
        color: var(--ink);
        padding: 8px;
        font:
          10px/1.35 'IBM Plex Mono',
          'Courier New',
          monospace;
        text-transform: uppercase;
        letter-spacing: 0.035em;
      }
      textarea.field {
        min-height: 76px;
        resize: vertical;
      }
      .tab-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1px;
        background: var(--ink);
        border: 1px solid var(--ink);
      }
      .tab {
        background: var(--paper);
        padding: 7px 5px;
        text-align: center;
        font-size: 9px;
      }
      .tab.active {
        background: var(--accent);
        color: #fff;
      }
      .preview-card {
        border: 1px solid var(--ink);
        background: var(--paper-3);
        padding: 8px;
      }
      .warning {
        border: 1px solid var(--ink);
        background: #f3e0ae;
        color: #5c3c00;
        padding: 7px;
        font-size: 9px;
        line-height: 1.35;
      }
      .hidden {
        display: none !important;
      }

      .mobile-screen .page-head,
      .mobile-screen .profile-hero {
        grid-template-columns: 1fr;
      }
      .mobile-screen .head-stats,
      .mobile-screen .facts {
        border-left: 0;
        border-top: 2px solid var(--ink);
        grid-template-columns: repeat(2, 1fr);
      }
      .mobile-screen .grid-2,
      .mobile-screen .grid-public,
      .mobile-screen .grid-even,
      .mobile-screen .grid-admin {
        display: block;
        min-height: auto;
      }
      .mobile-screen .panel,
      .mobile-screen .panel-stack {
        border-right: 0;
        border-left: 0;
        border-bottom: 2px solid var(--ink);
      }
      .mobile-screen .panel:last-child {
        border-bottom: 0;
      }
      .mobile-screen .nav {
        display: none;
      }
      .mobile-screen .brand {
        font-size: 11px;
      }
      .mobile-screen .login-link,
      .mobile-screen .admin-link {
        font-size: 9px;
        padding: 9px 7px;
      }
      .mobile-screen .auth-links span {
        font-size: 8px;
        padding: 9px 6px;
      }
      .mobile-screen .mark {
        width: 36px;
        font-size: 21px;
      }
      .mobile-screen .h1 {
        font-size: 48px;
      }
      .mobile-screen .event-row {
        grid-template-columns: 1fr;
      }
      .mobile-screen .actions {
        justify-content: flex-start;
      }
      .mobile-screen .person-row {
        grid-template-columns: 1fr;
      }

      @media (max-width: 860px) {
        .sidebar {
          position: static;
          width: auto;
          border-right: 0;
          border-bottom: 3px solid var(--accent);
        }
        .main {
          margin-left: 0;
          padding: 14px;
        }
        .canvas-toolbar {
          grid-template-columns: 1fr;
        }
        .device-controls,
        .spec-link {
          align-self: auto;
        }
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-title">FREDDY<br />FOUNDERS</div>
        <div class="sidebar-subtitle mono">
          BOOKFACE + EVENTS + COMPANIES + AUTH / FREDDY BRICK / NINE-PAGE MOCK
        </div>
      </div>
      <div class="screen-group">
        <div class="side-label mono">[ PUBLIC ]</div>
        <button class="screen-link active" data-screen="events">
          1 EVENTS<small>default public front page</small>
        </button>
        <button class="screen-link" data-screen="eventDetail">
          2 EVENT DETAIL<small>why attend + who to meet</small>
        </button>
        <button class="screen-link" data-screen="people">
          3 PEOPLE<small>Bookface-like directory</small>
        </button>
        <button class="screen-link" data-screen="personDetail">
          4 PERSON DETAIL<small>optional profile-lite view</small>
        </button>
        <button class="screen-link" data-screen="companies">
          5 COMPANIES<small>YC-style company directory</small>
        </button>
        <button class="screen-link" data-screen="companyDetail">
          6 COMPANY DETAIL<small>YC-style company profile</small>
        </button>
        <div class="side-label mono">[ AUTH ]</div>
        <button class="screen-link" data-screen="login">
          7 LOGIN<small>returning member/admin auth</small>
        </button>
        <button class="screen-link" data-screen="registration">
          8 REGISTRATION<small>request account / join</small>
        </button>
        <div class="side-label mono">[ INTERNAL ]</div>
        <button class="screen-link" data-screen="admin">
          9 ADMIN MAINTENANCE<small>simple CRUD + visibility</small>
        </button>
        <div class="side-label mono">[ DEVICE ]</div>
        <button class="screen-link sub active" data-device="desktop">↳ DESKTOP / PC</button>
        <button class="screen-link sub" data-device="mobile">↳ MOBILE</button>
      </div>
    </aside>

    <main class="main">
      <div class="canvas-toolbar">
        <div>
          <div class="canvas-title" id="canvasTitle">EVENTS / PC</div>
          <div class="canvas-note mono" id="canvasNote">
            Default public front page. Compact HN-like event rows with RSVP/register.

    <script>
      const screens = {
        events: {
          title: 'EVENTS',
          note: 'Default public front page. Compact HN-like event rows with RSVP/register.',
        },
        eventDetail: {
          title: 'EVENT DETAIL',
          note: 'Optional event page for why attend and who will I meet context.',
        },
        people: {
          title: 'PEOPLE',
          note: 'Bookface-like public-safe directory with search, filters, and compact rows.',
        },
        personDetail: {
          title: 'PERSON DETAIL',
          note: 'Optional profile-lite page or row expansion. No social network creep.',
        },
        companies: {
          title: 'COMPANIES',
          note: 'YC-style company directory with search, filters, short taglines, and company status.',
        },
        companyDetail: {
          title: 'COMPANY DETAIL',
          note: 'YC-style company profile with summary, facts, related people, and events.',
        },
        login: {
          title: 'LOGIN',
          note: 'Returning member/admin authentication. Public browsing remains open.',
        },
        registration: {
          title: 'REGISTRATION',
          note: 'Lightweight account request with consent-aware directory context.',
        },
        admin: {
          title: 'ADMIN MAINTENANCE',
          note: 'Simple internal CRUD for events, people, companies, accounts, links, relevance, and visibility.',
        },
      };
      const state = { screen: 'events', device: 'desktop' };
      const mount = document.getElementById('mount');
      const canvasTitle = document.getElementById('canvasTitle');
      const canvasNote = document.getElementById('canvasNote');

      function render() {
        const template = document.getElementById(`screen-${state.screen}`);
        const node = template.content.firstElementChild.cloneNode(true);
        const topbarSlot = node.querySelector('[data-topbar]');
        if (topbarSlot) {
          const topbar = document
            .getElementById(`topbar-${topbarSlot.dataset.topbar}`)
            .content.firstElementChild.cloneNode(true);
          topbarSlot.replaceWith(topbar);
        }

        mount.className = state.device === 'desktop' ? 'desktop-frame' : 'mobile-frame';
        const screen = document.createElement('div');
        screen.className = state.device === 'desktop' ? 'desktop-screen' : 'mobile-screen';
        screen.appendChild(node);
        mount.innerHTML = '';
        mount.appendChild(screen);

        canvasTitle.textContent = `${screens[state.screen].title} / ${state.device === 'desktop' ? 'PC' : 'MOBILE'}`;
        canvasNote.textContent = screens[state.screen].note;
        document
          .querySelectorAll('[data-screen]')
          .forEach((btn) => btn.classList.toggle('active', btn.dataset.screen === state.screen));
        document
          .querySelectorAll('[data-device]')
          .forEach((btn) => btn.classList.toggle('active', btn.dataset.device === state.device));
      }

      document.querySelectorAll('[data-screen]').forEach((btn) =>
        btn.addEventListener('click', () => {
          state.screen = btn.dataset.screen;
          render();
        }),
      );
      document.querySelectorAll('[data-device]').forEach((btn) =>
        btn.addEventListener('click', () => {
          state.device = btn.dataset.device;
          render();
        }),
      );
      render();
    </script>
